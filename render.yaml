databases:
  - name: sons-of-man-db
    databaseName: sons_of_man
    user: sons_of_man_user
    plan: free

services:
  - type: web
    name: sons-of-man-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGIN
        value: "*"
      - key: ETHERSCAN_API_KEY
        sync: false
      - key: BLOCKFROST_PROJECT_ID
        sync: false
      - key: BLOCKFROST_PREVIEW_PROJECT_ID
        sync: false

  - type: static
    name: sons-of-man-web
    rootDir: web
    buildCommand: npm install && npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
