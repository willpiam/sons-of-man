databases:
  - name: sons-of-man-db
    databaseName: sons_of_man
    user: sons_of_man_user
    plan: free

services:
  - type: web
    name: sons-of-man-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sons-of-man-db
          property: connectionString
      - key: CORS_ORIGIN
        value: "*"
      - key: ETHERSCAN_API_KEY
        sync: false
      - key: BLOCKFROST_PROJECT_ID
        sync: false
      - key: BLOCKFROST_PREVIEW_PROJECT_ID
        sync: false

  - type: static
    name: sons-of-man-web
    rootDir: .
    buildCommand: echo "No build step required"
    staticPublishPath: .
    routes:
      - type: rewrite
        source: /commit
        destination: /commit.html
      - type: rewrite
        source: /agnostic-commit
        destination: /commit.html
      - type: rewrite
        source: /agnostic
        destination: /commit.html
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
